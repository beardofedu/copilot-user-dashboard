<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copilot AI Spend Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
  <div class="min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <h1 class="text-3xl font-bold text-gray-900">🤖 Copilot AI Spend Dashboard</h1>
        <p class="text-gray-600 mt-1">Monitor AI credit usage by team member</p>
      </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <!-- Filters -->
      <div class="bg-white rounded-lg shadow p-6 mb-8">
        <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Year</label>
            <select id="yearSelect" class="w-full px-3 py-2 border border-gray-300 rounded-md">
              <option value="">Current Year</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Month</label>
            <select id="monthSelect" class="w-full px-3 py-2 border border-gray-300 rounded-md">
              <option value="">Current Month</option>
              <option value="1">January</option>
              <option value="2">February</option>
              <option value="3">March</option>
              <option value="4">April</option>
              <option value="5">May</option>
              <option value="6">June</option>
              <option value="7">July</option>
              <option value="8">August</option>
              <option value="9">September</option>
              <option value="10">October</option>
              <option value="11">November</option>
              <option value="12">December</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">User Limit ($)</label>
            <input id="limitInput" type="number" min="1" step="1" value="250" class="w-full px-3 py-2 border border-gray-300 rounded-md" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Near Limit (%)</label>
            <input id="nearLimitInput" type="number" min="1" max="99" step="1" value="80" class="w-full px-3 py-2 border border-gray-300 rounded-md" />
          </div>
          <div class="flex items-end">
            <button id="refreshBtn" class="w-full px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
              Refresh Data
            </button>
          </div>
        </div>
      </div>

      <!-- Summary Stats -->
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
        <div class="bg-white rounded-lg shadow p-6">
          <p class="text-gray-600 text-sm">Total Spend</p>
          <p class="text-3xl font-bold text-gray-900 mt-2" id="totalSpend">$0.00</p>
        </div>
        <div class="bg-white rounded-lg shadow p-6">
          <p class="text-gray-600 text-sm">Active Users</p>
          <p class="text-3xl font-bold text-gray-900 mt-2" id="activeUsers">0</p>
        </div>
        <div class="bg-white rounded-lg shadow p-6">
          <p class="text-gray-600 text-sm">Near Limit</p>
          <p class="text-3xl font-bold text-amber-600 mt-2" id="nearLimitUsers">0</p>
        </div>
        <div class="bg-white rounded-lg shadow p-6">
          <p class="text-gray-600 text-sm">At/Over Limit</p>
          <p class="text-3xl font-bold text-red-600 mt-2" id="atLimitUsers">0</p>
        </div>
      </div>

      <div id="notice" class="hidden mb-4 rounded-md border border-amber-300 bg-amber-50 p-4 text-sm text-amber-800"></div>

      <!-- Users Table -->
      <div class="bg-white rounded-lg shadow overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-200">
          <h2 class="text-lg font-semibold text-gray-900">Users Near / At Limit</h2>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full">
            <thead class="bg-gray-50 border-b border-gray-200">
              <tr>
                <th class="px-6 py-3 text-left text-sm font-semibold text-gray-900">User</th>
                <th class="px-6 py-3 text-right text-sm font-semibold text-gray-900">Total Cost</th>
                <th class="px-6 py-3 text-right text-sm font-semibold text-gray-900">% of Limit</th>
                <th class="px-6 py-3 text-left text-sm font-semibold text-gray-900">Status</th>
                <th class="px-6 py-3 text-left text-sm font-semibold text-gray-900">Top Models Used</th>
              </tr>
            </thead>
            <tbody id="usersTableBody">
              <tr>
                <td colspan="5" class="px-6 py-8 text-center text-gray-500">Loading...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script>
    // Populate year dropdown
    const currentYear = new Date().getFullYear();
    const yearSelect = document.getElementById('yearSelect');
    for (let i = 0; i < 3; i++) {
      const option = document.createElement('option');
      option.value = currentYear - i;
      option.textContent = currentYear - i;
      yearSelect.appendChild(option);
    }

    // Fetch and display data
    async function loadUsageData() {
      const year = document.getElementById('yearSelect').value;
      const month = document.getElementById('monthSelect').value;
      const refreshBtn = document.getElementById('refreshBtn');
      const tbody = document.getElementById('usersTableBody');

      refreshBtn.disabled = true;
      refreshBtn.textContent = 'Loading...';
      tbody.innerHTML = '<tr><td colspan="4" class="px-6 py-8 text-center text-gray-500">Loading...</td></tr>';

      try {
        const params = new URLSearchParams();
        if (year) params.append('year', year);
        if (month) params.append('month', month);
        const limitValue = Number(document.getElementById('limitInput').value);
        const nearLimitValue = Number(document.getElementById('nearLimitInput').value);
        if (Number.isFinite(limitValue) && limitValue > 0) params.append('limit', String(limitValue));
        if (Number.isFinite(nearLimitValue) && nearLimitValue > 0 && nearLimitValue < 100) {
          params.append('near_limit_percent', String(nearLimitValue / 100));
        }

        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 25000);
        const response = await fetch(`/api/usage?${params}`, { signal: controller.signal });
        clearTimeout(timeout);
        const data = await response.json();

        if (response.ok) {
          displayData(data);
        } else {
          tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-red-600">${data.error || 'Failed to load data'}</td></tr>`;
        }
      } catch (error) {
        const message = error.name === 'AbortError'
          ? 'Request timed out. Try again.'
          : `Failed to load data: ${error.message}`;
        tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-red-600">${message}</td></tr>`;
      } finally {
        refreshBtn.disabled = false;
        refreshBtn.textContent = 'Refresh Data';
      }
    }

    function statusBadge(status) {
      if (status === 'at_limit') return '<span class="inline-flex rounded-full bg-red-100 px-2 py-1 text-xs font-semibold text-red-700">At / Over limit</span>';
      if (status === 'near_limit') return '<span class="inline-flex rounded-full bg-amber-100 px-2 py-1 text-xs font-semibold text-amber-700">Near limit</span>';
      return '<span class="inline-flex rounded-full bg-emerald-100 px-2 py-1 text-xs font-semibold text-emerald-700">Healthy</span>';
    }

    function displayData(payload) {
      const usersData = Array.isArray(payload?.users) ? payload.users : [];
      const summary = payload?.summary || {};
      const meta = payload?.meta || {};

      const notice = document.getElementById('notice');
      if (meta.userLevelAvailable === false) {
        notice.classList.remove('hidden');
        notice.textContent = meta.reason
          ? `User-level data unavailable: ${meta.reason} Showing organization totals.`
          : 'User-level data is unavailable with the current endpoint/permissions. Showing organization totals.';
      } else {
        notice.classList.add('hidden');
        notice.textContent = '';
      }

      if (!Array.isArray(usersData) || usersData.length === 0) {
        document.getElementById('usersTableBody').innerHTML = 
          '<tr><td colspan="5" class="px-6 py-8 text-center text-gray-500">No data available</td></tr>';
        return;
      }

      document.getElementById('totalSpend').textContent = `$${(summary.totalSpend || 0).toFixed(2)}`;
      document.getElementById('activeUsers').textContent = summary.activeUsers || 0;
      document.getElementById('nearLimitUsers').textContent = summary.nearLimitUsers || 0;
      document.getElementById('atLimitUsers').textContent = summary.atLimitUsers || 0;

      // Update table
      const tbody = document.getElementById('usersTableBody');
      tbody.innerHTML = usersData.map(user => {
        const topModels = Array.isArray(user.topModels) && user.topModels.length > 0
          ? user.topModels.map(model => `${model.model} ($${model.cost.toFixed(2)})`).join(', ')
          : '—';
        const rowClass = user.status === 'at_limit'
          ? 'bg-red-50'
          : user.status === 'near_limit'
            ? 'bg-amber-50'
            : '';

        return `
          <tr class="border-b border-gray-200 hover:bg-gray-50 ${rowClass}">
            <td class="px-6 py-4 text-sm text-gray-900 font-medium">${user.user}</td>
            <td class="px-6 py-4 text-sm text-right text-gray-900">$${user.totalCost.toFixed(2)}</td>
            <td class="px-6 py-4 text-sm text-right text-gray-900 font-semibold">${user.percentOfLimit.toFixed(1)}%</td>
            <td class="px-6 py-4 text-sm">${statusBadge(user.status)}</td>
            <td class="px-6 py-4 text-sm text-gray-600">${topModels}</td>
          </tr>
        `;
      }).join('');
    }

    // Event listeners
    document.getElementById('refreshBtn').addEventListener('click', loadUsageData);
    document.getElementById('yearSelect').addEventListener('change', loadUsageData);
    document.getElementById('monthSelect').addEventListener('change', loadUsageData);
    document.getElementById('limitInput').addEventListener('change', loadUsageData);
    document.getElementById('nearLimitInput').addEventListener('change', loadUsageData);

    // Initial load
    loadUsageData();
  </script>
</body>
</html>
